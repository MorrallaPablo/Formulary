<main>
    <h1>Create Issue</h1>

    <form [formGroup]="form" (submit)="onFormSubmit()">
        <label>Title
            <input 
                type="text"
                placeholder="Title"
                formControlName="title"
            />

            @if (isInvalid(title)) {
                @if (title?.errors?.['required']){
                    <small class="error">Title is required</small>
                }
                @if (title?.errors?.['minlength']) {
                    <small class="error">Title has a minimum length of 5 characters</small>
                }
                @if (title?.errors?.['maxlength']){
                    <small class="error">Title has a maximum length of 60 characters</small>
                }
            }
        </label>

        <label>Description
            <textarea
                placeholder="Description"
                formControlName="description"
            >
            </textarea>

            @if (isInvalid(description)) {
                @if (description?.errors?.['required']){
                    <small class="error">Description is required</small>
                }
                @if (description?.errors?.['minlength']) {
                    <small class="error">Description has a minimum length of 20 characters</small>
                }
                @if (description?.errors?.['maxlength']){
                    <small class="error">Description has a maximum length of 500 characters</small>
                }
            }
        </label>

        <label>Category
            <input 
                type="text"
                placeholder="Category"
                formControlName="category"
            />

            @if (isInvalid(category)) {
                @if (category?.errors?.['required']){
                    <small class="error">Category is required</small>
                }
                @if (category?.errors?.['maxlength']){
                    <small class="error">Category has a maximum length of 32 characters</small>
                }
            }
        </label>

        <label>Priority
            <input 
                type="number"
                formControlName="priority"
            />

            @if (isInvalid(priority)) {
                @if (priority?.errors?.['required']){
                    <small class="error">Priority is required</small>
                }
                @if (priority?.errors?.['min'] || priority?.errors?.['max']){
                    <small class="error">Priority has to be between 1 and 5</small>
                }
            }
        </label>

        <label>Email
            <input 
                type="text"
                placeholder="Email"
                formControlName="email"
            />

            @if (isInvalid(email)) {
                @if (email?.errors?.['required']){
                    <small class="error">Email is required</small>
                }
                @if (email?.errors?.['email']){
                    <small class="error">Email should have the format name@domain.com</small>
                }
            }
        </label>

        <button 
            type="submit"
            [disabled]="form.invalid"
        >
            Create Issue
        </button>

        @if (successMessage()) {
            <p class="success">{{successMessage()}}</p>
        }
        @if (errorMessage()) {
            <p class="error">{{errorMessage()}}</p>
        }
    </form>

    <button routerLink="/">Go Back to List</button>
</main>
