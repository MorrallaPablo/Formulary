<main>
    <h1>Create Issue</h1>

    <form [formGroup]="form" (submit)="onFormSubmit()">
        <label>Title
            <input 
                type="text"
                placeholder="Title"
                formControlName="title"
            />
        </label>

        <label>Description
            <textarea
                placeholder="Description"
                formControlName="description"
            >
            </textarea>
        </label>

        <label>Category
            <input 
                type="text"
                placeholder="Category"
                formControlName="category"
            />
        </label>

        <label>Priority
            <input 
                type="number"
                formControlName="priority"
            />
        </label>

        <label>Email
            <input 
                type="text"
                placeholder="Email"
                formControlName="email"
            />
        </label>

        <button type="submit">
            Create Issue
        </button>
    </form>
</main>
